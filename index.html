<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>艺风考试管理系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    /* ===== 通用 ===== */
    .hidden { display: none !important; }
    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ===== 登录页 ===== */
    .login-page { background: #f5f5f5; }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 44px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
    }
    .card-title {
      text-align: center;
      font-size: 26px;
      font-weight: 700;
      color: #07c160;
      margin-bottom: 6px;
    }
    .card-sub {
      text-align: center;
      font-size: 14px;
      color: #999;
      margin-bottom: 36px;
    }
    .input-field {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e8e8e8;
      border-radius: 10px;
      font-size: 17px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 18px;
    }
    .input-field:focus { border-color: #07c160; }
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: #07c160;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 2px;
    }
    .btn-primary:active { background: #059653; }

    /* ===== 准备页 ===== */
    .ready-page { background: #f5f5f5; }
    .ready-info {
      width: 90%; max-width: 400px;
      background: #fff;
      border-radius: 16px;
      padding: 36px 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      text-align: center;
    }
    .ready-hi {
      font-size: 28px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
    }
    .ready-tip {
      font-size: 14px;
      color: #999;
      margin-bottom: 28px;
    }
    .cat-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
    }
    .cat-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
    }
    .cat-item .ci-name { display: flex; align-items: center; gap: 10px; }
    .cat-item .ci-time { font-size: 13px; font-weight: 400; opacity: 0.7; }
    .ci-gushi { background: #e8f5e9; color: #1b5e20; }
    .ci-wenyi { background: #f3e5f5; color: #4a148c; }
    .ci-xinwen { background: #e3f2fd; color: #0d47a1; }
    .ci-jixing { background: #fffde7; color: #7c5e00; }

    /* ===== 考试页 ===== */
    .exam-page {
      background: #f5f5f5;
      padding: 0;
      justify-content: flex-start;
    }

    /* 顶部栏 */
    .topbar {
      width: 100%;
      background: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      border-bottom: 1px solid #eee;
    }
    .topbar-title { font-size: 16px; font-weight: 700; color: #111; }

    /* 计时器容器 - 正中间上方 */
    .timer-wrap {
      width: 100%;
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      padding: 20px 24px 12px;
    }
    .timer-card {
      background: #fff;
      border-radius: 14px;
      padding: 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .timer-cat-label {
      font-size: 13px;
      color: #999;
      font-weight: 600;
    }
    .timer-num {
      font-size: 40px;
      font-weight: 800;
      color: #333;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .timer-num.warn { color: #e53935; animation: blink 0.5s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

    /* 题目区域 */
    .q-wrap {
      flex: 1;
      width: 100%;
      padding: 12px 24px 20px;
      overflow-y: auto;
    }
    .q-card {
      background: #fff;
      border-radius: 14px;
      min-height: calc(100vh - 220px);
      padding: 32px 36px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .q-text {
      font-size: 26px;
      line-height: 2.2;
      color: #111;
      flex: 1;
    }
    .q-text.center { text-align: center; }
    .q-text.left { text-align: left; }

    /* 下一题按钮 */
    .bottom-bar {
      width: 100%;
      padding: 16px 24px 28px;
      flex-shrink: 0;
      display: flex;
      justify-content: center;
    }
    .btn-next {
      background: #07c160;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 15px 72px;
      font-size: 18px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 2px;
    }
    .btn-next.orange { background: #fa9d3b; }
    .btn-next:active { opacity: 0.85; }

    /* ===== 弹窗 ===== */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-box {
      background: #fff;
      border-radius: 18px;
      padding: 40px 36px;
      width: 88%;
      max-width: 360px;
      text-align: center;
    }
    .modal-icon { font-size: 52px; margin-bottom: 14px; }
    .modal-title { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 8px; }
    .modal-desc { font-size: 14px; color: #888; margin-bottom: 28px; line-height: 1.6; }

    /* 时间到 */
    .timeup-num {
      font-size: 64px;
      font-weight: 900;
      color: #e53935;
      margin: 8px 0;
      font-variant-numeric: tabular-nums;
    }
    .timeup-sub { font-size: 14px; color: #999; margin-bottom: 28px; }
    .modal-btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      border: none;
      cursor: pointer;
      letter-spacing: 1px;
    }
    .btn-green { background: #07c160; color: #fff; }
    .btn-gray { background: #f0f0f0; color: #666; }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      top: 20px; right: 20px;
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      z-index: 200;
      animation: taIn 0.3s;
    }
    .toast-ok { background: #07c160; color: #fff; }
    .toast-err { background: #e53935; color: #fff; }
    @keyframes taIn { from{transform:translateX(120%);opacity:0} to{transform:translateX(0);opacity:1} }

    /* ===== 加载 ===== */
    .loading {
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.96);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px; z-index: 300;
    }
    .spin {
      width: 40px; height: 40px;
      border: 3px solid #e8f5e9;
      border-top-color: #07c160;
      border-radius: 50%;
      animation: rot 0.75s linear infinite;
    }
    @keyframes rot { to{transform:rotate(360deg)} }
    .loading-txt { font-size: 15px; color: #07c160; font-weight: 600; }
  </style>
</head>
<body>

<!-- ========== 登录页 ========== -->
<div class="page login-page" id="loginPage">
  <div class="card">
    <div class="card-title">艺风考试管理系统</div>
    <div class="card-sub">请输入您的姓名进入考试</div>
    <input type="text" class="input-field" id="inputName" placeholder="请输入学员姓名" autocomplete="off">
    <button class="btn-primary" onclick="doLogin()">进入考试</button>
  </div>
</div>

<!-- ========== 准备页 ========== -->
<div class="page ready-page hidden" id="readyPage">
  <div class="ready-info">
    <div class="ready-hi">您好，<span id="readyName"></span></div>
    <div class="ready-tip">以下为您的考试安排，请做好准备</div>
    <div class="cat-row">
      <div class="cat-item ci-gushi"><div class="ci-name"><span>📜</span>古诗词</div><div class="ci-time">1 分钟</div></div>
      <div class="cat-item ci-wenyi"><div class="ci-name"><span>🎭</span>文艺稿件</div><div class="ci-time">1 分钟</div></div>
      <div class="cat-item ci-xinwen"><div class="ci-name"><span>📰</span>新闻播报</div><div class="ci-time">1 分钟</div></div>
      <div class="cat-item ci-jixing"><div class="ci-name"><span>💡</span>即兴评述</div><div class="ci-time">2 分钟</div></div>
    </div>
    <button class="btn-primary" onclick="startExam()">开始考试</button>
  </div>
</div>

<!-- ========== 考试页 ========== -->
<div class="page exam-page hidden" id="examPage">

  <!-- 顶部栏 -->
  <div class="topbar">
    <div class="topbar-title">🎓 艺风考试</div>
  </div>

  <!-- 计时器：正中间上方 -->
  <div class="timer-wrap">
    <div class="timer-card">
      <div class="timer-cat-label" id="timerCatLabel">古诗词</div>
      <div class="timer-num" id="timerNum">01:00</div>
    </div>
  </div>

  <!-- 题目区域 -->
  <div class="q-wrap">
    <div class="q-card">
      <div class="q-text" id="qText"></div>
    </div>
  </div>

  <!-- 底部按钮 -->
  <div class="bottom-bar">
    <button class="btn-next" id="btnNext" onclick="nextQ()">下一题 →</button>
  </div>
</div>

<!-- ========== 时间到弹窗 ========== -->
<div class="modal hidden" id="timeupModal">
  <div class="modal-box">
    <div class="modal-icon">⏰</div>
    <div class="modal-title">时间到！</div>
    <div class="timeup-num" id="countNum">5</div>
    <div class="timeup-sub">秒后自动进入下一题</div>
    <button class="modal-btn btn-green" onclick="skipNext()">立即进入 →</button>
  </div>
</div>

<!-- ========== 考试结束弹窗 ========== -->
<div class="modal hidden" id="endModal">
  <div class="modal-box">
    <div class="modal-icon">🎉</div>
    <div class="modal-title">考试结束</div>
    <div class="modal-desc">恭喜您完成全部考试内容</div>
    <button class="modal-btn btn-green" onclick="backLogin()">返回登录</button>
  </div>
</div>

<!-- ========== 加载遮罩 ========== -->
<div class="loading hidden" id="loading">
  <div class="spin"></div>
  <div class="loading-txt">加载中...</div>
</div>

<script>
const API = 'https://pifhmjjwyqpzqsmutcib.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpZmhtamp3eXFwenFzbXV0Y2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDMyMzYsImV4cCI6MjA5MDc3OTIzNn0.tjPOVKoQN7fJuwFRAynxumYpImy26IZlvnnLEpw336w';

const CATS = [
  { key: '古诗词',   t: 60, cls: 'center' },
  { key: '文艺稿件', t: 60, cls: 'left' },
  { key: '新闻播报', t: 60, cls: 'left' },
  { key: '即兴评述', t: 120, cls: 'left' }
];

let student = null, questions = [], cur = 0;
let tInterval = null, tLeft = 0, cntInterval = null;

function api(path) {
  return fetch(API + '/rest/v1/' + path + (path.includes('?')?'&':'?') + 'apikey=' + KEY, {
    method: 'GET', headers: { 'Content-Type': 'application/json' }
  }).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });
}

function show(id) { document.querySelectorAll('.page').forEach(p => p.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
function loading(v) { document.getElementById('loading').classList.toggle('hidden', !v); }
function toast(msg, err) {
  const el = document.createElement('div');
  el.className = 'toast ' + (err ? 'toast-err' : 'toast-ok');
  el.textContent = msg; document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

async function doLogin() {
  const name = document.getElementById('inputName').value.trim();
  if (!name) { toast('请输入学员姓名', true); return; }
  loading(true);
  try {
    const list = await api('students?name=eq.' + encodeURIComponent(name) + '&select=*&limit=1');
    const s = Array.isArray(list) ? list[0] : null;
    if (!s) { toast('未找到该学员', true); loading(false); return; }
    student = s;
    const sets = await api('exam_sets?student_id=eq.' + s.id + '&select=category,questions(content)');
    if (!sets || sets.length === 0) { toast('该学员暂未分配套题', true); loading(false); return; }
    questions = CATS.map(c => {
      const item = sets.find(x => x.category === c.key);
      return { ...c, content: (item && item.questions) ? item.questions.content : '（无题目）' };
    });
    cur = 0;
    document.getElementById('readyName').textContent = s.name;
    loading(false);
    show('readyPage');
  } catch(e) { toast('网络错误：' + (e.message||e), true); loading(false); }
}

function startExam() {
  cur = 0;
  show('examPage');
  render();
}

function render() {
  if (cur >= questions.length) { showEnd(); return; }
  const q = questions[cur];
  document.getElementById('timerCatLabel').textContent = q.key;
  const el = document.getElementById('qText');
  el.className = 'q-text ' + q.cls;
  el.textContent = q.content;
  const btn = document.getElementById('btnNext');
  if (cur === questions.length - 1) {
    btn.textContent = '完成考试'; btn.className = 'btn-next orange';
  } else {
    btn.textContent = '下一题 →'; btn.className = 'btn-next';
  }
  startT(q.t);
}

function startT(sec) {
  clearT();
  tLeft = sec;
  updateT();
  tInterval = setInterval(() => {
    tLeft--;
    updateT();
    if (tLeft <= 0) { clearT(); showTimeup(); }
  }, 1000);
}

function updateT() {
  const m = String(Math.floor(tLeft / 60)).padStart(2,'0');
  const s = String(tLeft % 60).padStart(2,'0');
  const el = document.getElementById('timerNum');
  el.textContent = m + ':' + s;
  el.classList.toggle('warn', tLeft <= 10 && tLeft > 0);
}

function clearT() { if (tInterval) { clearInterval(tInterval); tInterval = null; } if (cntInterval) { clearInterval(cntInterval); cntInterval = null; } }

function showTimeup() {
  if (cur === questions.length - 1) { showEnd(); return; }
  let n = 5;
  document.getElementById('countNum').textContent = n;
  document.getElementById('timeupModal').classList.remove('hidden');
  cntInterval = setInterval(() => {
    n--;
    document.getElementById('countNum').textContent = n;
    if (n <= 0) { clearInterval(cntInterval); goNext(); }
  }, 1000);
}

function skipNext() { clearT(); goNext(); }

function nextQ() { clearT(); goNext(); }

function goNext() {
  document.getElementById('timeupModal').classList.add('hidden');
  cur++;
  if (cur < questions.length) render(); else showEnd();
}

function showEnd() {
  clearT();
  document.getElementById('endModal').classList.remove('hidden');
}

function backLogin() {
  document.getElementById('endModal').classList.add('hidden');
  document.getElementById('examPage').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('inputName').value = '';
  student = null; questions = []; cur = 0;
}

document.getElementById('inputName').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
