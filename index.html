<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考试系统 - 考试端</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; overflow: hidden; }

    /* ===================== 登录页 ===================== */
    .login-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; background: linear-gradient(135deg, #1a6b3c 0%, #27ae60 100%);
    }
    .login-box {
      background: white; border-radius: 24px; padding: 60px 50px;
      width: 460px; box-shadow: 0 24px 60px rgba(0,0,0,0.25);
    }
    .login-box h1 { text-align: center; color: #1a6b3c; margin-bottom: 12px; font-size: 38px; }
    .login-box p { text-align: center; color: #888; margin-bottom: 40px; font-size: 16px; }
    .form-group { margin-bottom: 28px; }
    .form-group label { display: block; margin-bottom: 10px; color: #1a6b3c; font-weight: 600; font-size: 18px; }
    .form-group input {
      width: 100%; padding: 18px 20px; border: 2px solid #c8e6c9; border-radius: 14px;
      font-size: 22px; outline: none; transition: border-color 0.3s; font-family: inherit;
    }
    .form-group input:focus { border-color: #1a6b3c; }
    .btn-login {
      width: 100%; padding: 20px; background: #1a6b3c; color: white;
      border: none; border-radius: 14px; font-size: 22px; font-weight: bold;
      cursor: pointer; transition: all 0.3s; font-family: inherit;
    }
    .btn-login:hover { background: #145a30; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,107,60,0.35); }

    /* ===================== 考试页 ===================== */
    .exam-screen { display: none; height: 100vh; flex-direction: column; background: #f0f2f5; }

    /* 顶部导航 */
    .top-bar {
      background: #1a6b3c; color: white; padding: 14px 28px;
      display: flex; align-items: center; gap: 16px; flex-shrink: 0;
    }
    .top-bar h2 { font-size: 20px; }
    .top-bar .spacer { flex: 1; }
    .top-bar .student-name { font-size: 15px; opacity: 0.85; }
    .top-bar button {
      padding: 7px 18px; background: rgba(255,255,255,0.15); color: white;
      border: 1px solid rgba(255,255,255,0.25); border-radius: 8px;
      cursor: pointer; font-size: 14px; font-family: inherit; transition: background 0.2s;
    }
    .top-bar button:hover { background: rgba(255,255,255,0.25); }
    .btn-end-exam { background: #c0392b !important; border-color: #c0392b !important; }
    .btn-end-exam:hover { background: #a93226 !important; border-color: #a93226 !important; }

    /* 进度条 */
    .progress-bar { height: 4px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
    .progress-fill { height: 100%; background: #a8e6cf; transition: width 0.4s; }

    /* 主体幻灯片区 */
    .slide-wrapper {
      flex: 1; overflow: hidden; position: relative;
    }

    /* 单个幻灯片页面 */
    .slide {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column;
      background: white;
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .slide.active {
      opacity: 1; pointer-events: auto;
    }

    /* 幻灯片页头 */
    .slide-header {
      padding: 24px 40px; display: flex; align-items: center; gap: 16px;
      flex-shrink: 0;
    }
    .slide-header .slide-icon { font-size: 28px; }
    .slide-header .slide-name { font-size: 20px; font-weight: 700; color: white; }
    .slide-header .slide-badge {
      margin-left: auto; padding: 6px 18px; border-radius: 20px;
      background: rgba(255,255,255,0.25); color: white; font-size: 13px;
    }
    .slide-header.gushi { background: linear-gradient(135deg, #1a6b3c, #27ae60); }
    .slide-header.wenyi { background: linear-gradient(135deg, #1565c0, #1e88e5); }
    .slide-header.xinwen { background: linear-gradient(135deg, #e65100, #fb8c00); }
    .slide-header.jixing { background: linear-gradient(135deg, #6a1b9a, #8e24aa); }

    /* 题目内容区 */
    .slide-content {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 40px 60px; overflow: hidden;
    }
    .slide-content .question-text {
      font-size: clamp(18px, 2.8vw, 30px);
      line-height: 2; color: #222; text-align: center;
      max-width: 900px; white-space: pre-wrap; word-break: break-all;
      letter-spacing: 0.5px;
    }
    /* 文艺稿件、新闻播报、即兴评述左对齐 */
    .slide-content .question-text.align-left {
      text-align: left;
    }

    /* 底部导航栏 */
    .nav-bar {
      background: white; padding: 20px 40px;
      display: flex; align-items: center; justify-content: center; gap: 24px;
      flex-shrink: 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
    }
    .nav-btn {
      padding: 16px 56px; border: none; border-radius: 14px;
      font-size: 20px; font-weight: bold; cursor: pointer;
      transition: all 0.25s; font-family: inherit;
    }
    .nav-btn.prev { background: #e8e8e8; color: #666; }
    .nav-btn.prev:hover { background: #d4d4d4; }
    .nav-btn.next { background: #1a6b3c; color: white; }
    .nav-btn.next:hover { background: #145a30; transform: translateX(4px); }
    .nav-btn.finish {
      background: linear-gradient(135deg, #c0392b, #e74c3c); color: white;
    }
    .nav-btn.finish:hover { background: linear-gradient(135deg, #a93226, #c0392b); }
    .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }

    /* 页码指示器 */
    .page-dots {
      display: flex; gap: 8px; align-items: center;
    }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #ccc; transition: all 0.3s;
    }
    .dot.active { background: #1a6b3c; width: 28px; border-radius: 5px; }
    .dot.done { background: #a8e6cf; }

    /* ===================== 加载中 ===================== */
    .loading-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.96); display: flex;
      align-items: center; justify-content: center; z-index: 300;
      flex-direction: column; gap: 20px;
    }
    .spinner {
      width: 52px; height: 52px; border: 5px solid #e8f5e9;
      border-top-color: #1a6b3c; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 20px; color: #1a6b3c; font-weight: 600; }

    /* ===================== 结束确认弹窗 ===================== */
    .confirm-modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.55); display: flex;
      align-items: center; justify-content: center; z-index: 400;
    }
    .confirm-box {
      background: white; border-radius: 24px; padding: 48px 40px;
      width: 420px; text-align: center;
    }
    .confirm-box h3 { font-size: 26px; color: #333; margin-bottom: 14px; }
    .confirm-box p { color: #888; margin-bottom: 36px; font-size: 16px; line-height: 1.6; }
    .confirm-btns { display: flex; gap: 16px; }
    .confirm-btns button { flex: 1; padding: 18px; border-radius: 14px; font-size: 18px; border: none; cursor: pointer; font-family: inherit; font-weight: 600; }
    .btn-cancel { background: #f0f0f0; color: #666; }
    .btn-cancel:hover { background: #e0e0e0; }
    .btn-confirm-end { background: #c0392b; color: white; }
    .btn-confirm-end:hover { background: #a93226; }

    /* Toast */
    .toast {
      position: fixed; top: 80px; right: 30px; padding: 16px 28px;
      color: white; border-radius: 12px; font-size: 16px; z-index: 500;
      animation: slideIn 0.3s;
    }
    .toast-ok { background: #27ae60; }
    .toast-err { background: #e74c3c; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body>

  <!-- 登录页 -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h1>🎓 考试系统</h1>
      <p>请输入您的姓名开始考试</p>
      <div class="form-group">
        <label>学员姓名</label>
        <input type="text" id="studentNameInput" placeholder="请输入学员姓名" autocomplete="off">
      </div>
      <button class="btn-login" id="loginBtn" onclick="doExamLogin()">进入考试</button>
    </div>
  </div>

  <!-- 考试页 -->
  <div class="exam-screen" id="examScreen">
    <!-- 顶部栏 -->
    <div class="top-bar">
      <h2>🎓 考试答题</h2>
      <span class="spacer"></span>
      <span class="student-name" id="studentDisplay"></span>
      <button onclick="toggleFullscreen()" id="fsBtn">全屏</button>
      <button class="btn-end-exam" onclick="showEndConfirm()">结束考试</button>
    </div>
    <!-- 进度条 -->
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <!-- 幻灯片区域 -->
    <div class="slide-wrapper" id="slideWrapper"></div>

    <!-- 底部导航 -->
    <div class="nav-bar">
      <button class="nav-btn prev" id="btnPrev" onclick="prevSlide()">← 上一题</button>
      <div class="page-dots" id="pageDots"></div>
      <button class="nav-btn next" id="btnNext" onclick="nextSlide()">下一题 →</button>
    </div>

    <!-- 加载中 -->
    <div class="loading-overlay" id="loadingOverlay" style="display:none;">
      <div class="spinner"></div>
      <div class="loading-text">加载中，请稍候...</div>
    </div>

    <!-- 结束确认 -->
    <div class="confirm-modal" id="confirmModal" style="display:none;">
      <div class="confirm-box">
        <h3>确认结束考试？</h3>
        <p>结束考试后将返回登录界面</p>
        <div class="browse">
          <button class="btn-cancel" onclick="hideEndConfirm()">取消</button>
          <button class="btn-confirm-end" onclick="endExam()">确认结束</button>
        </div>
      </div>
    </div>
  </div>

<script>
// ===== 配置 =====
const SUPABASE_URL = 'https://pifhmjjwyqpzqsmutcib.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpZmhtamp3eXFwenFzbXV0Y2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDMyMzYsImV4cCI6MjA5MDc3OTIzNn0.tjPOVKoQN7fJuwFRAynxumYpImy26IZlvnnLEpw336w';

let currentStudent = null;
let currentIndex = 0;
let examData = [];

const categories = [
  { key: '古诗词', icon: '📜', cls: 'gushi' },
  { key: '文艺稿件', icon: '🎭', cls: 'wenyi' },
  { key: '新闻播报', icon: '📰', cls: 'xinwen' },
  { key: '即兴评述', icon: '💡', cls: 'jixing' }
];

// ===== REST API =====
function api(path, options = {}) {
  const url = SUPABASE_URL + '/rest/v1/' + path;
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json'
  };
  return fetch(url, { ...options, headers: { ...headers, ...(options.headers || {}) } })
    .then(r => r.json());
}

// ===== Toast =====
function toast(msg, ok) {
  const el = document.createElement('div');
  el.className = 'toast ' + (ok !== false ? 'toast-ok' : 'toast-err');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ===== 加载状态 =====
function showLoading() { document.getElementById('loadingOverlay').style.display = 'flex'; }
function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }

// ===== 登录 =====
async function doExamLogin() {
  const name = document.getElementById('studentNameInput').value.trim();
  if (!name) { toast('请输入学员姓名', false); return; }

  showLoading();
  document.getElementById('loginBtn').disabled = true;

  try {
    const students = await api('students?name=eq.' + encodeURIComponent(name) + '&select=*&limit=1');
    const data = Array.isArray(students) ? students[0] : null;
    if (!data) { toast('未找到该学员，请确认姓名', false); return; }
    currentStudent = data;

    const examSets = await api(
      'exam_sets?student_id=eq.' + data.id +
      '&select=category,questions(content)'
    );
    if (!examSets || examSets.length === 0) { toast('该学员暂未分配套题，请联系管理员', false); return; }

    examData = categories.map(cat => {
      const item = examSets.find(e => e.category === cat.key);
      return {
        ...cat,
        content: (item && item.questions) ? item.questions.content : '（无题目）'
      };
    });

    currentIndex = 0;

    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('examScreen').style.display = 'flex';
    document.getElementById('studentDisplay').textContent = '学员：' + data.name;

    renderSlides();
    updateNav();

  } catch (err) {
    console.error(err);
    toast('网络错误，请检查网络后重试', false);
  } finally {
    hideLoading();
    document.getElementById('loginBtn').disabled = false;
  }
}

// ===== 渲染全部幻灯片 =====
function renderSlides() {
  const wrapper = document.getElementById('slideWrapper');
  const dots = document.getElementById('pageDots');

  // 生成幻灯片 DOM
  wrapper.innerHTML = examData.map((item, i) => {
    const statusText = i < currentIndex ? '已完成' : (i === currentIndex ? '当前' : '');
    // 古诗词居中，其他左对齐
    const alignClass = (item.cls === 'gushi') ? '' : ' align-left';
    return '<div class="slide' + (i === currentIndex ? ' active' : '') + '" id="slide-' + i + '">' +
      '<div class="slide-header ' + item.cls + '">' +
        '<span class="slide-icon">' + item.icon + '</span>' +
        '<span class="slide-name">' + item.key + '</span>' +
        '<span class="slide-badge">' + statusText + '</span>' +
      '</div>' +
      '<div class="slide-content">' +
        '<div class="question-text' + alignClass + '">' + escapeHtml(item.content) + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  // 生成指示点
  dots.innerHTML = examData.map((_, i) =>
    '<div class="dot' + (i === currentIndex ? ' active' : (i < currentIndex ? ' done' : '')) + '"></div>'
  ).join('');
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ===== 导航逻辑 =====
function goToSlide(idx) {
  if (idx < 0 || idx >= examData.length) return;
  const prev = document.getElementById('slide-' + currentIndex);
  const next = document.getElementById('slide-' + idx);
  if (prev) prev.classList.remove('active');
  if (next) next.classList.add('active');

  // 更新头部 badge
  document.querySelectorAll('.slide').forEach((s, i) => {
    const badge = s.querySelector('.slide-badge');
    if (!badge) return;
    badge.textContent = i < idx ? '已完成' : (i === idx ? '当前' : '');
  });

  currentIndex = idx;
  updateNav();
}

function nextSlide() {
  goToSlide(currentIndex + 1);
}

function prevSlide() {
  goToSlide(currentIndex - 1);
}

// 更新导航按钮 & 进度条 & 指示点
function updateNav() {
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  const isFirst = currentIndex === 0;
  const isLast = currentIndex === examData.length - 1;

  btnPrev.disabled = isFirst;
  btnNext.disabled = isLast;

  // 最后一题把"下一题"改成"完成"
  if (isLast) {
    btnNext.textContent = '✅ 完成';
    btnNext.classList.add('finish');
    btnNext.classList.remove('next');
    btnNext.onclick = function() { showEndConfirm(); };
  } else {
    btnNext.textContent = '下一题 →';
    btnNext.classList.remove('finish');
    btnNext.classList.add('next');
    btnNext.onclick = nextSlide;
  }

  // 进度条
  const pct = examData.length > 0 ? ((currentIndex + 1) / examData.length) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';

  // 指示点
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.className = 'dot' + (i === currentIndex ? ' active' : (i < currentIndex ? ' done' : ''));
  });
}

// ===== 结束考试 =====
function showEndConfirm() { document.getElementById('confirmModal').style.display = 'flex'; }
function hideEndConfirm() { document.getElementById('confirmModal').style.display = 'none'; }

function endExam() {
  hideEndConfirm();
  if (document.fullscreenElement) document.exitFullscreen();
  currentStudent = null;
  currentIndex = 0;
  examData = [];
  document.getElementById('examScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('studentNameInput').value = '';
  toast('考试已结束');
}

// ===== 全屏 =====
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => toast('全屏不可用', false));
  } else {
    document.exitFullscreen();
  }
}
document.addEventListener('fullscreenchange', () => {
  const btn = document.getElementById('fsBtn');
  if (btn) btn.textContent = document.fullscreenElement ? '退出全屏' : '全屏';
});

// 回车登录
document.getElementById('studentNameInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') doExamLogin();
});

// 键盘翻页
document.addEventListener('keydown', e => {
  if (document.getElementById('examScreen').style.display === 'none') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevSlide(); }
  if (e.key === 'Escape') { hideEndConfirm(); }
});
</script>
</body>
</html>
