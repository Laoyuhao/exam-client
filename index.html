<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考试系统 - 考试端</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; }

    /* 登录页 */
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a6b3c 0%, #2e9c57 100%);
    }
    .login-box {
      background: white;
      border-radius: 20px;
      padding: 60px 50px;
      width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .login-box h1 { text-align: center; color: #1a6b3c; margin-bottom: 40px; font-size: 36px; }
    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; margin-bottom: 10px; color: #1a6b3c; font-weight: 600; font-size: 18px; }
    .form-group input {
      width: 100%; padding: 18px; border: 2px solid #c8e6c9; border-radius: 12px;
      font-size: 20px; outline: none; transition: border-color 0.3s; font-family: inherit;
    }
    .form-group input:focus { border-color: #1a6b3c; }
    .btn-login {
      width: 100%; padding: 20px; background: #1a6b3c; color: white;
      border: none; border-radius: 12px; font-size: 22px; font-weight: bold;
      cursor: pointer; transition: all 0.3s; margin-top: 10px;
    }
    .btn-login:hover { background: #145a30; transform: translateY(-2px); }

    /* 考试页 */
    .exam-screen { display: none; min-height: 100vh; background: #f5f7fa; }
    .exam-header {
      background: #1a6b3c; color: white; padding: 16px 30px;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 10;
    }
    .exam-header h2 { font-size: 22px; }
    .exam-header-right { display: flex; gap: 12px; align-items: center; }
    .student-info { font-size: 16px; opacity: 0.9; }
    .btn-fullscreen {
      padding: 8px 16px; background: rgba(255,255,255,0.2); color: white;
      border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; cursor: pointer; font-size: 14px;
    }
    .btn-fullscreen:hover { background: rgba(255,255,255,0.3); }
    .btn-end { padding: 8px 16px; background: #c0392b; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn-end:hover { background: #a93226; }

    .progress-bar { background: #e8f5e9; height: 6px; }
    .progress-fill { height: 100%; background: #1a6b3c; transition: width 0.3s; }

    .exam-body { padding: 30px; max-width: 1000px; margin: 0 auto; }
    .exam-title { font-size: 28px; color: #1a6b3c; margin-bottom: 30px; text-align: center; }

    .category-card {
      background: white; border-radius: 16px; margin-bottom: 24px; overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      opacity: 0.4; filter: blur(4px); transition: all 0.3s;
    }
    .category-card.current { opacity: 1; filter: none; box-shadow: 0 8px 32px rgba(26,107,60,0.15); }
    .category-card.completed { opacity: 0.6; filter: none; }
    .category-header { padding: 24px 30px; color: white; display: flex; align-items: center; gap: 16px; }
    .category-header.gushi { background: linear-gradient(135deg, #1a6b3c, #2e9c57); }
    .category-header.wenyi { background: linear-gradient(135deg, #1565c0, #1e88e5); }
    .category-header.xinwen { background: linear-gradient(135deg, #e65100, #f57c00); }
    .category-header.jixing { background: linear-gradient(135deg, #6a1b9a, #8e24aa); }
    .category-icon { font-size: 32px; }
    .category-name { font-size: 24px; font-weight: bold; }
    .category-status { margin-left: auto; padding: 6px 16px; background: rgba(255,255,255,0.2); border-radius: 20px; font-size: 14px; }
    .category-content { padding: 30px; font-size: 20px; line-height: 1.8; color: #333; white-space: pre-wrap; }

    .exam-footer {
      position: fixed; bottom: 0; left: 0; right: 0; background: white;
      padding: 20px 30px; display: flex; justify-content: center; gap: 20px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    }
    .btn-next, .btn-prev { padding: 16px 48px; border: none; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
    .btn-next { background: #1a6b3c; color: white; }
    .btn-next:hover { background: #145a30; }
    .btn-prev { background: #e0e0e0; color: #666; }
    .btn-prev:hover { background: #d0d0d0; }
    .btn-next:disabled, .btn-prev:disabled { opacity: 0.4; cursor: not-allowed; }

    .toast {
      position: fixed; top: 80px; right: 30px; padding: 16px 24px;
      color: white; border-radius: 10px; font-size: 16px; z-index: 1000;
      animation: slideIn 0.3s;
    }
    .toast-ok { background: #27ae60; }
    .toast-err { background: #e74c3c; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .loading-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.95); display: flex;
      align-items: center; justify-content: center; z-index: 100; flex-direction: column; gap: 20px;
    }
    .spinner {
      width: 48px; height: 48px; border: 4px solid #e8f5e9;
      border-top-color: #1a6b3c; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 20px; color: #1a6b3c; }

    .confirm-modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); display: flex;
      align-items: center; justify-content: center; z-index: 200;
    }
    .confirm-box { background: white; border-radius: 20px; padding: 40px; width: 420px; text-align: center; }
    .confirm-box h3 { font-size: 24px; color: #333; margin-bottom: 16px; }
    .confirm-box p { color: #666; margin-bottom: 30px; font-size: 16px; }
    .confirm-btns { display: flex; gap: 16px; }
    .confirm-btns button { flex: 1; padding: 16px; border-radius: 12px; font-size: 18px; border: none; cursor: pointer; }
    .btn-cancel { background: #e0e0e0; color: #666; }
    .btn-confirm-end { background: #1a6b3c; color: white; }

    .page-body { padding-bottom: 100px; }
  </style>
</head>
<body>

  <!-- 登录页 -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h1>考试系统</h1>
      <div class="form-group">
        <label>学员姓名</label>
        <input type="text" id="studentNameInput" placeholder="请输入学员姓名" autocomplete="off">
      </div>
      <button class="btn-login" id="loginBtn" onclick="doExamLogin()">进入考试</button>
    </div>
  </div>

  <!-- 考试页 -->
  <div class="exam-screen" id="examScreen">
    <div class="exam-header">
      <h2>考试答题</h2>
      <div class="exam-header-right">
        <span class="student-info" id="studentDisplay"></span>
        <button class="btn-fullscreen" id="fsBtn" onclick="toggleFullscreen()">全屏</button>
        <button class="btn-end" onclick="showEndConfirm()">结束考试</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="exam-body page-body">
      <div class="exam-title" id="examTitle">正在加载...</div>
      <div id="categoryList"></div>
    </div>
    <div class="exam-footer">
      <button class="btn-prev" id="btnPrev" onclick="prevCategory()">上一题</button>
      <button class="btn-next" id="btnNext" onclick="nextCategory()">下一题</button>
    </div>

    <!-- 加载中 -->
    <div class="loading-overlay" id="loadingOverlay" style="display:none;">
      <div class="spinner"></div>
      <div class="loading-text">加载中，请稍候...</div>
    </div>

    <!-- 结束确认 -->
    <div class="confirm-modal" id="confirmModal" style="display:none;">
      <div class="confirm-box">
        <h3>确认结束考试？</h3>
        <p>结束考试后将返回登录界面</p>
        <div class="confirm-btns">
          <button class="btn-cancel" onclick="hideEndConfirm()">取消</button>
          <button class="btn-confirm-end" onclick="endExam()">确认结束</button>
        </div>
      </div>
    </div>
  </div>

<script>
// ===== 配置 =====
const SUPABASE_URL = 'https://pifhmjjwyqpzqsmutcib.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpZmhtamp3eXFwenFzbXV0Y2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDMyMzYsImV4cCI6MjA5MDc3OTIzNn0.tjPOVKoQN7fJuwFRAynxumYpImy26IZlvnnLEpw336w';

let currentStudent = null;
let currentIndex = 0;
let examData = [];

const categories = [
  { key: '古诗词', icon: '📜', cls: 'gushi' },
  { key: '文艺稿件', icon: '🎭', cls: 'wenyi' },
  { key: '新闻播报', icon: '📰', cls: 'xinwen' },
  { key: '即兴评述', icon: '💡', cls: 'jixing' }
];

// ===== REST API 工具函数 =====
function api(path, options = {}) {
  const url = SUPABASE_URL + '/rest/v1/' + path;
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json'
  };
  return fetch(url, { ...options, headers: { ...headers, ...(options.headers || {}) } })
    .then(r => r.json());
}

// ===== Toast =====
function toast(msg, ok) {
  const el = document.createElement('div');
  el.className = 'toast ' + (ok !== false ? 'toast-ok' : 'toast-err');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function showLoading() { document.getElementById('loadingOverlay').style.display = 'flex'; }
function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }

// ===== 登录 =====
async function doExamLogin() {
  const name = document.getElementById('studentNameInput').value.trim();
  if (!name) { toast('请输入学员姓名', false); return; }

  showLoading();
  document.getElementById('loginBtn').disabled = true;

  try {
    // 1. 按姓名查找学员
    const students = await api('students?name=eq.' + encodeURIComponent(name) + '&select=*&limit=1');
    const data = Array.isArray(students) ? students[0] : null;

    if (!data) {
      toast('未找到该学员，请确认姓名是否正确', false);
      return;
    }
    currentStudent = data;

    // 2. 查询该学员的套题（关联 questions 表）
    const examSets = await api(
      'exam_sets?student_id=eq.' + data.id +
      '&select=category,question_id,questions(content)'
    );

    if (!examSets || examSets.length === 0) {
      toast('该学员暂未分配套题，请联系管理员', false);
      return;
    }

    // 3. 按四个类别组装数据
    examData = categories.map(cat => {
      const item = examSets.find(e => e.category === cat.key);
      return {
        ...cat,
        content: (item && item.questions) ? item.questions.content : '（无题目）'
      };
    });

    currentIndex = 0;

    // 4. 切换到考试页面
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('examScreen').style.display = 'block';
    document.getElementById('studentDisplay').textContent = '学员：' + data.name;

    renderCategories();
    updateProgress();

  } catch (err) {
    console.error(err);
    toast('网络错误，请检查网络连接后重试', false);
  } finally {
    hideLoading();
    document.getElementById('loginBtn').disabled = false;
  }
}

// ===== 渲染题目 =====
function renderCategories() {
  const titleText = examData.length > 0
    ? currentStudent.name + ' 的考试题目（第 ' + (currentIndex + 1) + ' / ' + examData.length + ' 题）'
    : '暂无题目';
  document.getElementById('examTitle').textContent = titleText;

  document.getElementById('categoryList').innerHTML = examData.map((item, i) => {
    let cls = '';
    let statusText = '';
    if (i < currentIndex) { cls = 'completed'; statusText = '已完成'; }
    else if (i === currentIndex) { cls = 'current'; statusText = '当前'; }
    return '<div class="category-card ' + cls + '">' +
      '<div class="category-header ' + item.cls + '">' +
        '<span class="category-icon">' + item.icon + '</span>' +
        '<span class="category-name">' + item.key + '</span>' +
        '<span class="category-status">' + statusText + '</span>' +
      '</div>' +
      '<div class="category-content">' + item.content + '</div>' +
    '</div>';
  }).join('');

  document.getElementById('btnPrev').disabled = currentIndex === 0;
  document.getElementById('btnNext').disabled = currentIndex === examData.length - 1;
}

function updateProgress() {
  const pct = examData.length > 0 ? ((currentIndex + 1) / examData.length) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ===== 翻页 =====
function nextCategory() {
  if (currentIndex < examData.length - 1) {
    currentIndex++;
    renderCategories();
    updateProgress();
    scrollToCurrent();
  }
}

function prevCategory() {
  if (currentIndex > 0) {
    currentIndex--;
    renderCategories();
    updateProgress();
    scrollToCurrent();
  }
}

function scrollToCurrent() {
  const cards = document.querySelectorAll('.category-card');
  if (cards[currentIndex]) {
    cards[currentIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

// ===== 结束考试 =====
function showEndConfirm() { document.getElementById('confirmModal').style.display = 'flex'; }
function hideEndConfirm() { document.getElementById('confirmModal').style.display = 'none'; }

function endExam() {
  hideEndConfirm();
  currentStudent = null;
  currentIndex = 0;
  examData = [];
  document.getElementById('examScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('studentNameInput').value = '';
  if (document.fullscreenElement) document.exitFullscreen();
  toast('考试已结束');
}

// ===== 全屏 =====
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => toast('全屏模式不可用', false));
  } else {
    document.exitFullscreen();
  }
}

document.addEventListener('fullscreenchange', () => {
  const btn = document.getElementById('fsBtn');
  if (btn) btn.textContent = document.fullscreenElement ? '退出全屏' : '全屏';
});

// 回车登录
document.getElementById('studentNameInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') doExamLogin();
});
</script>
</body>
</html>
